<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список уроков</title>
</head>
<body>
<h1>список уроков</h1>

{% csrf_token %}


<ul>
    {% for lesson in lessons %}
        <li>
            <a href="{% url 'lesson_detail' lesson.id %}">
                {{ lesson.title }}
            </a>
        </li>
    {% empty %}
        <li>Пока что нет уроков :(</li>
    {% endfor %}
</ul>
</body>
</html>
